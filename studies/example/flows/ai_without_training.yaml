stages:
  - id: intro
    title: "Welcome & Instructions"
    duration: "5:00"
    content: content/intro.md
    confirmation: "I confirm I have read and understood the instructions."

  - id: personality_survey
    title: "Personality Survey"
    duration: "5:00"
    content: content/personality_survey.md
    link:
      label: "Open the personality survey"
      url: "https://personality-survey.example.com/?user=<USER_ID>"
    confirmation: "I confirm I have completed the personality survey."

  - id: cognitive_test
    title: "Cognitive Ability Test"
    duration: "10:00"
    content: content/cognitive_test.md
    link:
      label: "Open the cognitive test"
      url: "https://cognitive-test.example.com/?user=<USER_ID>"
    input:
      label: "Your response"
      prompt: "Briefly describe your approach to the cognitive test."
    confirmation: "I confirm I have completed the cognitive test."

  - id: break
    title: "Short Break"
    duration: "5:00"
    content: content/break.md
    confirmation: "I am ready to continue."

  - id: task1
    title: "Data Analysis Task"
    duration: "30:00"
    content: content/task1_data_analysis.md
    chatbot: true
    files:
      - filename: files/discrimination_campaign_data.csv
        description: "Student enrollment and discrimination complaint data from 1998-2003 across US schools."
      - filename: files/student_anonymous_complaints_v2.csv
        description: "Time series of average anonymous student complaints from 1998-2003."
      - filename: files/research_methodology.jpg
        description: "Research methodology reference image."
    sidebar_panels:
      - title: "Scenario"
        content: "You are assisting a professor in evaluating the outcome of an anti-discrimination campaign across schools in the US conducted for one year in 2000. You have access to the professor's data folder to complete the analysis. Unfortunately, the professor let their kid play with the folder, so it may contain unnecessary files, and some data files may be corrupted or unreliable."
        defaultExpanded: true
      - title: "Data Description"
        content: "The data folder contains student enrollment records with demographic information (gender, race, class, region) and discrimination complaint indicators spanning 1998-2003. There is also a separate file with time series data of average anonymous complaints. Be aware: not all files may be relevant, and some data sources may have quality issues. Part of the task is figuring out which data to trust."
    questions:
      - "Which files are relevant and which are irrelevant or unusable?"
      - "Did the number of complaints decrease after the campaign?"
      - "Do you think the campaign was successful?"
    input:
      label: "Your analysis"
      prompt: "Explain your findings and reasoning. Include which files you used and why."
    confirmation: "I confirm this is my final answer and I'm aware I won't be able to edit it after submitting."

  - id: task2
    title: "Negotiation Task"
    duration: "20:00"
    content: content/task2_negotiation.md
    chatbot: true
    link:
      label: "Open the negotiation app"
      url: "https://company-negotiation-experiment.empirica.app/?participantKey=<USER_ID>"
    sidebar_panels:
      - title: "Negotiation Context"
        content: "You are about to enter a business negotiation simulation. Use the AI assistant to help you prepare your strategy: analyse the scenario, consider the other party's likely positions, develop your arguments, and plan your concessions. Once you feel prepared, open the negotiation app to begin. You can return to the AI assistant at any time during the negotiation for advice."
        defaultExpanded: true
    input:
      label: "Your negotiation summary"
      prompt: "Describe your negotiation strategy, what happened during the negotiation, and the outcome you achieved."
    confirmation: "I confirm this is my final answer."

  - id: end
    title: "Thank You"
    duration: "2:00"
    content: content/end.md
    confirmation: "I confirm I have finished the study."
