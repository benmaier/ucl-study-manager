appId: com.ucl.study-manager
productName: "UCL Study Manager"

directories:
  output: dist-electron

files:
  - electron/**/*
  - "!node_modules"
  - "!src"
  - "!cli"
  - "!studies"
  - "!tests"
  - "!prisma"
  - "!sql"
  - "!scripts"
  - "!.next"
  - "!.env"
  - "!.env.example"

asar: false

mac:
  target:
    - target: dir
      arch: [arm64, x64]
  identity: null

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
